<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16212c"/>
      <stop offset="100%" stop-color="#1c2a37"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="16" fill="url(#fn-bg)"/>

  <!-- 8x8 nonogram grid, cell size 25, origin 140,50 -->
  <g stroke="#334a5e" stroke-width="1" fill="none">
    <path d="M140,50 H340 M140,75 H340 M140,100 H340 M140,125 H340 M140,150 H340 M140,175 H340 M140,200 H340 M140,225 H340 M140,250 H340"/>
    <path d="M140,50 V250 M165,50 V250 M190,50 V250 M215,50 V250 M240,50 V250 M265,50 V250 M290,50 V250 M315,50 V250 M340,50 V250"/>
  </g>

  <!-- filled cells forming a heart, in accent purple -->
  <g fill="#c084fc">
    <rect x="165" y="75" width="25" height="25"/>
    <rect x="215" y="75" width="25" height="25"/>
    <rect x="290" y="75" width="25" height="25"/>
    <rect x="140" y="100" width="25" height="25"/>
    <rect x="190" y="100" width="25" height="25"/>
    <rect x="240" y="100" width="25" height="25"/>
    <rect x="265" y="100" width="25" height="25"/>
    <rect x="315" y="100" width="25" height="25"/>
    <rect x="140" y="125" width="25" height="25"/>
    <rect x="315" y="125" width="25" height="25"/>
    <rect x="165" y="150" width="25" height="25"/>
    <rect x="290" y="150" width="25" height="25"/>
    <rect x="190" y="175" width="25" height="25"/>
    <rect x="265" y="175" width="25" height="25"/>
    <rect x="215" y="200" width="25" height="25"/>
    <rect x="240" y="200" width="25" height="25"/>
  </g>

  <g font-family="monospace" font-size="12" fill="#9fb0bf" opacity="0.8">
    <text x="40" y="90">2</text>
    <text x="40" y="115">1 1 1</text>
    <text x="40" y="140">1 1</text>
  </g>
</svg>
